name: Validate blueprints

on:
  push:
    paths:
      - "blueprints/**"
      - ".yamllint.yml"
      - ".github/workflows/validate.yml"
  pull_request:
    paths:
      - "blueprints/**"
      - ".yamllint.yml"
      - ".github/workflows/validate.yml"

jobs:
  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install --quiet yamllint

      - name: Lint all blueprints
        run: yamllint -c .yamllint.yml blueprints/

  parse-check:
    name: Parse blueprint YAML (with !input support)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PyYAML
        run: pip install --quiet pyyaml

      - name: Parse every blueprint file
        run: |
          python3 - <<'EOF'
          import glob
          import sys

          import yaml

          def input_constructor(loader, node):
              if isinstance(node, yaml.ScalarNode):
                  return loader.construct_scalar(node)
              if isinstance(node, yaml.SequenceNode):
                  return loader.construct_sequence(node)
              if isinstance(node, yaml.MappingNode):
                  return loader.construct_mapping(node)

          yaml.SafeLoader.add_constructor("!input", input_constructor)

          files = glob.glob("blueprints/**/*.yaml", recursive=True)
          if not files:
              print("No blueprint files found.")
              sys.exit(1)

          failed = False
          for path in files:
              try:
                  with open(path, encoding="utf-8") as f:
                      data = yaml.safe_load(f)
                  assert "blueprint" in data, "missing top-level 'blueprint:' key"
                  assert "domain" in data["blueprint"], "missing 'blueprint.domain'"
                  print(f"OK   {path}")
              except Exception as exc:  # noqa: BLE001
                  print(f"FAIL {path}: {exc}")
                  failed = True

          sys.exit(1 if failed else 0)
          EOF
