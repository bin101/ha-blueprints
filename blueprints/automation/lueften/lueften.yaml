blueprint:
  name: "Airing Reminder – Open/Close Windows (Summer Cooling)"
  description: >
    **Version:** 1.0.1 - see
    [CHANGELOG](https://github.com/bin101/ha-blueprints/blob/main/blueprints/automation/lueften/CHANGELOG.md)
    for version history.

    Announces when windows should be **closed** (outside is warmer than
    inside) and when they should be **opened** to air out the house
    (outside is cooler than inside). Announcements strictly **alternate**
    close -> open -> close: the same reminder is never sent twice in a row.
    Once "close" has been announced, an "open" must happen before "close"
    can be announced again (and vice versa), so brief sensor flapping
    around a single threshold can no longer produce several identical
    notifications in one day. This is achieved **without any helper
    entities** - a self-sustaining wait loop remembers which side was last
    announced.

    The announcement can go out as a **TTS message** on any number of media
    players (only within the configured morning/evening time window)
    and/or as a **push notification** to any number of directly selected
    notify targets (e.g. notify.mobile_app_yourphone) - sent only to
    targets whose linked device is detected as "home", with **no time
    restriction**. Window sensors are optional: if configured, "close" is
    only announced when at least one window is open, and "open" only when
    at least one is closed.

    The TTS and push steps are each their own named action in the
    sequence, so you can test either one on demand straight from the
    automation editor (open the automation → the action step → **Run**),
    without setting up any extra helper entities. A manual test run sends
    to all configured targets (ignoring the "home" presence check for
    push) using the separate test message below.

    Full documentation: see the README.md next to this blueprint.
  domain: automation
  source_url: https://github.com/bin101/ha-blueprints/blob/main/blueprints/automation/lueften/lueften.yaml
  input:
    temp_section:
      name: Temperature
      icon: mdi:thermometer
      input:
        indoor_temp:
          name: Indoor temperature sensor
          description: Temperature sensor measuring the indoor temperature.
          selector:
            entity:
              domain: sensor
              device_class: temperature
        outdoor_temp:
          name: Outdoor temperature sensor
          description: Temperature sensor measuring the outdoor temperature.
          selector:
            entity:
              domain: sensor
              device_class: temperature
        hysteresis:
          name: Hysteresis
          description: >
            Buffer in °C by which the outdoor temperature must exceed/fall
            below the indoor temperature before triggering. Prevents
            "flapping" when both temperatures are nearly equal.
          default: 1.0
          selector:
            number:
              min: 0
              max: 10
              step: 0.5
              unit_of_measurement: "°C"
              mode: box
        min_indoor_open:
          name: Minimum indoor temperature to open
          description: >
            In the evening, "open windows" is only announced if the indoor
            temperature is above this value. Avoids announcements on cool
            evenings where airing out wouldn't help anyway.
          default: 22
          selector:
            number:
              min: 0
              max: 35
              step: 0.5
              unit_of_measurement: "°C"
              mode: box
        debounce_minutes:
          name: Minimum hold duration
          description: >
            The temperature condition must be continuously met for this many
            minutes before triggering. Adds extra protection against brief
            outliers.
          default: 5
          selector:
            number:
              min: 0
              max: 60
              step: 1
              unit_of_measurement: min
              mode: box

    time_section:
      name: Time window (TTS only)
      icon: mdi:clock-outline
      input:
        morning_start:
          name: Morning – start
          description: >
            The "close windows" TTS announcement may only play from this
            time onward. Does not affect the push notification, which has
            no time restriction.
          default: "05:00:00"
          selector:
            time: {}
        morning_end:
          name: Morning – end
          description: >
            The "close windows" TTS announcement may only play until this
            time. Does not affect the push notification.
          default: "11:00:00"
          selector:
            time: {}
        evening_start:
          name: Evening – start
          description: >
            The "open windows" TTS announcement may only play from this
            time onward. Does not affect the push notification, which has
            no time restriction.
          default: "18:00:00"
          selector:
            time: {}
        evening_end:
          name: Evening – end
          description: >
            The "open windows" TTS announcement may only play until this
            time. Does not affect the push notification.
          default: "23:59:00"
          selector:
            time: {}

    push_section:
      name: "Notification: Push (optional)"
      icon: mdi:cellphone-message
      input:
        notify_targets:
          name: Notify targets
          description: >
            Any number of notify entities to send push notifications to
            (e.g. notify.mobile_app_yourphone - pick them directly from the
            list, no need to know the exact entity ID). A target only
            receives the notification if its device has a device_tracker
            that reports "home" - targets without a linked tracker, or
            that aren't home, are skipped. Leave empty to send no push
            notifications.
          default: []
          selector:
            entity:
              domain: notify
              multiple: true

    tts_section:
      name: "Notification: TTS announcement (optional)"
      icon: mdi:account-voice
      input:
        tts_engine:
          name: TTS engine
          description: >
            TTS service/entity used for the voice announcement. Leave empty
            to skip TTS announcements.
          default: ""
          selector:
            entity:
              domain: tts
        tts_media_players:
          name: Media players for the announcement
          description: >
            Any number of media players on which the announcement should be
            played.
          default: []
          selector:
            entity:
              domain: media_player
              multiple: true

    window_section:
      name: Window sensors (optional)
      icon: mdi:window-open-variant
      input:
        window_sensors:
          name: Window/door sensors
          description: >
            Optional: binary sensors that detect open windows/doors. If set,
            "close" is only announced while at least one of them is open,
            and "open" only while at least one is closed. Leave empty to
            skip this check.
          default: []
          selector:
            entity:
              domain: binary_sensor
              multiple: true

    text_section:
      name: Messages
      icon: mdi:message-text
      input:
        notify_title:
          name: Notification title
          default: Airing reminder
          selector:
            text: {}
        message_close:
          name: "\"Close windows\" message"
          default: "It's warmer outside than inside – please close the windows."
          selector:
            text: {}
        message_open:
          name: "\"Open windows\" message"
          default: "It's cooler outside than inside – please open the windows to air out the house."
          selector:
            text: {}
        test_message:
          name: Test message
          description: >
            Used when manually running the "Send TTS announcement" or
            "Send push notification" action from the automation editor
            (instead of message_close/message_open).
          default: This is a test message from the Airing Reminder blueprint.
          selector:
            text: {}

mode: single
max_exceeded: silent

# Values already needed inside trigger templates must be provided via
# trigger_variables - regular `variables:` are not yet available there.
trigger_variables:
  indoor_temp: !input indoor_temp
  outdoor_temp: !input outdoor_temp
  hysteresis: !input hysteresis

trigger:
  # These triggers only ever *start* the self-sustaining loop below. Once
  # it is running it drives itself (it waits for the next threshold on its
  # own), so any further trigger that fires while it is already running is
  # dropped by `mode: single` + `max_exceeded: silent`. That dropping is
  # exactly what stops a flapping sensor from sending the same reminder
  # several times: repeated "close" fires are ignored while the loop is
  # already waiting for the "open" threshold.
  - platform: homeassistant
    event: start
  # Fires when the outdoor temperature crosses the indoor temperature
  # (plus hysteresis) from below to above -> close windows.
  - platform: template
    id: close
    value_template: >
      {{ states(indoor_temp) not in ['unknown', 'unavailable', 'none']
         and states(outdoor_temp) not in ['unknown', 'unavailable', 'none']
         and states(outdoor_temp) | float >= states(indoor_temp) | float + hysteresis | float }}
    for:
      minutes: !input debounce_minutes
  # Fires when the outdoor temperature crosses the indoor temperature
  # (minus hysteresis) from above to below -> open windows.
  - platform: template
    id: open
    value_template: >
      {{ states(indoor_temp) not in ['unknown', 'unavailable', 'none']
         and states(outdoor_temp) not in ['unknown', 'unavailable', 'none']
         and states(outdoor_temp) | float <= states(indoor_temp) | float - hysteresis | float }}
    for:
      minutes: !input debounce_minutes

# Used by the wait loop below (not by the individually-testable send
# actions - those re-declare everything they need themselves, see comments).
variables:
  indoor_temp: !input indoor_temp
  outdoor_temp: !input outdoor_temp
  hysteresis: !input hysteresis

condition: []

action:
  # A single self-sustaining loop is the (helper-free) memory of which side
  # was announced last. It always runs "wait for close -> announce close ->
  # wait for open -> announce open" in that fixed order, so it physically
  # cannot announce the same side twice in a row: after announcing "close"
  # it is blocked waiting for the *open* threshold (outdoor a full 2x
  # hysteresis below indoor) before it can loop back and announce "close"
  # again. Because `mode: single`, all the extra "close"/"open" triggers a
  # flapping sensor produces while the loop is waiting are silently dropped.
  #
  # `while: trigger is defined` keeps the loop alive for a real run (started
  # by any of the triggers above) but makes it a no-op for a manual
  # whole-automation Run (which has no trigger and would otherwise hang on
  # the first wait). Individual send steps are still testable on their own -
  # see the per-action Run notes on each one.
  - alias: Alternating open/close announcement loop
    repeat:
      while: "{{ trigger is defined }}"
      sequence:
        # ---------- wait until it is warmer outside (debounced) ----------
        - alias: Wait for the "close" threshold
          repeat:
            sequence:
              - wait_template: >
                  {{ states(indoor_temp) not in ['unknown', 'unavailable', 'none']
                     and states(outdoor_temp) not in ['unknown', 'unavailable', 'none']
                     and states(outdoor_temp) | float
                         >= states(indoor_temp) | float + hysteresis | float }}
              - delay:
                  minutes: !input debounce_minutes
            # After the debounce delay, only proceed if the condition is
            # still true; otherwise it was a blip and we wait again.
            until: >
              {{ states(indoor_temp) not in ['unknown', 'unavailable', 'none']
                 and states(outdoor_temp) not in ['unknown', 'unavailable', 'none']
                 and states(outdoor_temp) | float
                     >= states(indoor_temp) | float + hysteresis | float }}

        - alias: Send TTS announcement (close windows)
          # Own `variables:` so this step can be Run standalone from the
          # editor (per-action Run does NOT carry over variables defined
          # outside the action being run). A standalone test Run has no
          # `trigger`, so it falls back to the test message and ignores the
          # time-window / window-sensor gating.
          variables:
            message_close: !input message_close
            test_message: !input test_message
            tts_engine: !input tts_engine
            tts_media_players: !input tts_media_players
            window_sensors: !input window_sensors
            message: "{{ message_close if trigger is defined else test_message }}"
          if:
            - condition: template
              value_template: "{{ tts_engine != '' and tts_media_players | count > 0 }}"
            - condition: or
              conditions:
                - condition: template
                  value_template: "{{ trigger is not defined }}"
                - condition: and
                  conditions:
                    - condition: time
                      after: !input morning_start
                      before: !input morning_end
                    - condition: template
                      value_template: >
                        {{ window_sensors | count == 0
                           or window_sensors | select('is_state', 'on') | list | count > 0 }}
          then:
            - action: tts.speak
              target:
                entity_id: !input tts_engine
              data:
                media_player_entity_id: !input tts_media_players
                message: "{{ message }}"

        - alias: Send push notification (close windows)
          variables:
            message_close: !input message_close
            test_message: !input test_message
            notify_targets_input: !input notify_targets
            window_sensors: !input window_sensors
            message: "{{ message_close if trigger is defined else test_message }}"
            # Real run: only targets whose device has a device_tracker
            # reporting "home". Standalone test Run: every configured target.
            notify_targets: >
              {% if trigger is defined %}
                {% set ns = namespace(targets=[]) %}
                {% for nt in notify_targets_input %}
                  {% set trk = namespace(home=false) %}
                  {% set did = device_id(nt) %}
                  {% if did %}
                    {% for e in device_entities(did) %}
                      {% if e.startswith('device_tracker.') and is_state(e, 'home') %}
                        {% set trk.home = true %}
                      {% endif %}
                    {% endfor %}
                  {% endif %}
                  {% if trk.home %}
                    {% set ns.targets = ns.targets + [nt] %}
                  {% endif %}
                {% endfor %}
                {{ ns.targets }}
              {% else %}
                {{ notify_targets_input }}
              {% endif %}
          # Push is intentionally NOT time-restricted; only the window-sensor
          # plausibility check applies (skipped on a standalone test Run).
          if:
            - condition: or
              conditions:
                - condition: template
                  value_template: "{{ trigger is not defined }}"
                - condition: template
                  value_template: >
                    {{ window_sensors | count == 0
                       or window_sensors | select('is_state', 'on') | list | count > 0 }}
          then:
            - repeat:
                for_each: "{{ notify_targets }}"
                sequence:
                  - action: notify.send_message
                    target:
                      entity_id: "{{ repeat.item }}"
                    data:
                      title: !input notify_title
                      message: "{{ message }}"

        # ---------- wait until it is cooler outside (debounced) ----------
        - alias: Wait for the "open" threshold
          repeat:
            sequence:
              - wait_template: >
                  {{ states(indoor_temp) not in ['unknown', 'unavailable', 'none']
                     and states(outdoor_temp) not in ['unknown', 'unavailable', 'none']
                     and states(outdoor_temp) | float
                         <= states(indoor_temp) | float - hysteresis | float }}
              - delay:
                  minutes: !input debounce_minutes
            until: >
              {{ states(indoor_temp) not in ['unknown', 'unavailable', 'none']
                 and states(outdoor_temp) not in ['unknown', 'unavailable', 'none']
                 and states(outdoor_temp) | float
                     <= states(indoor_temp) | float - hysteresis | float }}

        - alias: Send TTS announcement (open windows)
          variables:
            message_open: !input message_open
            test_message: !input test_message
            tts_engine: !input tts_engine
            tts_media_players: !input tts_media_players
            window_sensors: !input window_sensors
            message: "{{ message_open if trigger is defined else test_message }}"
          if:
            - condition: template
              value_template: "{{ tts_engine != '' and tts_media_players | count > 0 }}"
            - condition: or
              conditions:
                - condition: template
                  value_template: "{{ trigger is not defined }}"
                - condition: and
                  conditions:
                    - condition: time
                      after: !input evening_start
                      before: !input evening_end
                    - condition: numeric_state
                      entity_id: !input indoor_temp
                      above: !input min_indoor_open
                    - condition: template
                      value_template: >
                        {{ window_sensors | count == 0
                           or window_sensors | select('is_state', 'off') | list | count > 0 }}
          then:
            - action: tts.speak
              target:
                entity_id: !input tts_engine
              data:
                media_player_entity_id: !input tts_media_players
                message: "{{ message }}"

        - alias: Send push notification (open windows)
          variables:
            message_open: !input message_open
            test_message: !input test_message
            notify_targets_input: !input notify_targets
            window_sensors: !input window_sensors
            message: "{{ message_open if trigger is defined else test_message }}"
            notify_targets: >
              {% if trigger is defined %}
                {% set ns = namespace(targets=[]) %}
                {% for nt in notify_targets_input %}
                  {% set trk = namespace(home=false) %}
                  {% set did = device_id(nt) %}
                  {% if did %}
                    {% for e in device_entities(did) %}
                      {% if e.startswith('device_tracker.') and is_state(e, 'home') %}
                        {% set trk.home = true %}
                      {% endif %}
                    {% endfor %}
                  {% endif %}
                  {% if trk.home %}
                    {% set ns.targets = ns.targets + [nt] %}
                  {% endif %}
                {% endfor %}
                {{ ns.targets }}
              {% else %}
                {{ notify_targets_input }}
              {% endif %}
          # Push is intentionally NOT time-restricted; on a real run it still
          # requires it to be warm enough inside for airing to make sense.
          if:
            - condition: or
              conditions:
                - condition: template
                  value_template: "{{ trigger is not defined }}"
                - condition: and
                  conditions:
                    - condition: numeric_state
                      entity_id: !input indoor_temp
                      above: !input min_indoor_open
                    - condition: template
                      value_template: >
                        {{ window_sensors | count == 0
                           or window_sensors | select('is_state', 'off') | list | count > 0 }}
          then:
            - repeat:
                for_each: "{{ notify_targets }}"
                sequence:
                  - action: notify.send_message
                    target:
                      entity_id: "{{ repeat.item }}"
                    data:
                      title: !input notify_title
                      message: "{{ message }}"
