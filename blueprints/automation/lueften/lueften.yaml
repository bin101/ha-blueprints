blueprint:
  name: "Airing Reminder – Open/Close Windows (Summer Cooling)"
  description: >
    Announces **once in the morning** when windows should be closed
    (outside is warmer than inside), and **once in the evening** when they
    should be opened to air out the house (outside is cooler than inside).

    The announcement can go out as a **TTS message** on any number of media
    players and/or as a **push notification** to any number of directly
    selected notify targets (e.g. notify.mobile_app_yourphone) - sent only
    to targets whose linked device is detected as "home". Window sensors
    are optional: if configured, "close" is only announced when at least
    one window is open, and "open" only when at least one is closed.

    The TTS and push steps are each their own named action in the
    sequence, so you can test either one on demand straight from the
    automation editor (open the automation → the action step → **Run**),
    without setting up any extra helper entities. A manual test run sends
    to all configured targets (ignoring the "home" presence check for
    push) using the separate test message below.

    Full documentation: see the README.md next to this blueprint.
  domain: automation
  source_url: https://github.com/bin101/ha-blueprints/blob/main/blueprints/automation/lueften/lueften.yaml
  input:
    temp_section:
      name: Temperature
      icon: mdi:thermometer
      input:
        indoor_temp:
          name: Indoor temperature sensor
          description: Temperature sensor measuring the indoor temperature.
          selector:
            entity:
              domain: sensor
              device_class: temperature
        outdoor_temp:
          name: Outdoor temperature sensor
          description: Temperature sensor measuring the outdoor temperature.
          selector:
            entity:
              domain: sensor
              device_class: temperature
        hysteresis:
          name: Hysteresis
          description: >
            Buffer in °C by which the outdoor temperature must exceed/fall
            below the indoor temperature before triggering. Prevents
            "flapping" when both temperatures are nearly equal.
          default: 1.0
          selector:
            number:
              min: 0
              max: 10
              step: 0.5
              unit_of_measurement: "°C"
              mode: box
        min_indoor_open:
          name: Minimum indoor temperature to open
          description: >
            In the evening, "open windows" is only announced if the indoor
            temperature is above this value. Avoids announcements on cool
            evenings where airing out wouldn't help anyway.
          default: 22
          selector:
            number:
              min: 0
              max: 35
              step: 0.5
              unit_of_measurement: "°C"
              mode: box
        debounce_minutes:
          name: Minimum hold duration
          description: >
            The temperature condition must be continuously met for this many
            minutes before triggering. Adds extra protection against brief
            outliers.
          default: 5
          selector:
            number:
              min: 0
              max: 60
              step: 1
              unit_of_measurement: min
              mode: box

    time_section:
      name: Time window
      icon: mdi:clock-outline
      input:
        morning_start:
          name: Morning – start
          description: "\"Close windows\" may only be announced from this time onward."
          default: "05:00:00"
          selector:
            time: {}
        morning_end:
          name: Morning – end
          description: "\"Close windows\" may only be announced until this time."
          default: "11:00:00"
          selector:
            time: {}
        evening_start:
          name: Evening – start
          description: "\"Open windows\" may only be announced from this time onward."
          default: "18:00:00"
          selector:
            time: {}
        evening_end:
          name: Evening – end
          description: "\"Open windows\" may only be announced until this time."
          default: "23:59:00"
          selector:
            time: {}

    push_section:
      name: "Notification: Push (optional)"
      icon: mdi:cellphone-message
      input:
        notify_targets:
          name: Notify targets
          description: >
            Any number of notify entities to send push notifications to
            (e.g. notify.mobile_app_yourphone - pick them directly from the
            list, no need to know the exact entity ID). A target only
            receives the notification if its device has a device_tracker
            that reports "home" - targets without a linked tracker, or
            that aren't home, are skipped. Leave empty to send no push
            notifications.
          default: []
          selector:
            entity:
              domain: notify
              multiple: true

    tts_section:
      name: "Notification: TTS announcement (optional)"
      icon: mdi:account-voice
      input:
        tts_engine:
          name: TTS engine
          description: >
            TTS service/entity used for the voice announcement. Leave empty
            to skip TTS announcements.
          default: ""
          selector:
            entity:
              domain: tts
        tts_media_players:
          name: Media players for the announcement
          description: >
            Any number of media players on which the announcement should be
            played.
          default: []
          selector:
            entity:
              domain: media_player
              multiple: true

    window_section:
      name: Window sensors (optional)
      icon: mdi:window-open-variant
      input:
        window_sensors:
          name: Window/door sensors
          description: >
            Optional: binary sensors that detect open windows/doors. If set,
            "close" is only announced while at least one of them is open,
            and "open" only while at least one is closed. Leave empty to
            skip this check.
          default: []
          selector:
            entity:
              domain: binary_sensor
              multiple: true

    text_section:
      name: Messages
      icon: mdi:message-text
      input:
        notify_title:
          name: Notification title
          default: Airing reminder
          selector:
            text: {}
        message_close:
          name: "\"Close windows\" message"
          default: "It's warmer outside than inside – please close the windows."
          selector:
            text: {}
        message_open:
          name: "\"Open windows\" message"
          default: "It's cooler outside than inside – please open the windows to air out the house."
          selector:
            text: {}
        test_message:
          name: Test message
          description: >
            Used when manually running the "Send TTS announcement" or
            "Send push notification" action from the automation editor
            (instead of message_close/message_open).
          default: This is a test message from the Airing Reminder blueprint.
          selector:
            text: {}

mode: single
max_exceeded: silent

# Values already needed inside trigger templates must be provided via
# trigger_variables - regular `variables:` are not yet available there.
trigger_variables:
  indoor_temp: !input indoor_temp
  outdoor_temp: !input outdoor_temp
  hysteresis: !input hysteresis

trigger:
  # Fires exactly once when the outdoor temperature crosses the indoor
  # temperature (plus hysteresis) from below to above -> close windows.
  - platform: template
    id: close
    value_template: >
      {{ states(indoor_temp) not in ['unknown', 'unavailable', 'none']
         and states(outdoor_temp) not in ['unknown', 'unavailable', 'none']
         and states(outdoor_temp) | float >= states(indoor_temp) | float + hysteresis | float }}
    for:
      minutes: !input debounce_minutes
  # Fires exactly once when the outdoor temperature crosses the indoor
  # temperature (minus hysteresis) from above to below -> open windows.
  - platform: template
    id: open
    value_template: >
      {{ states(indoor_temp) not in ['unknown', 'unavailable', 'none']
         and states(outdoor_temp) not in ['unknown', 'unavailable', 'none']
         and states(outdoor_temp) | float <= states(indoor_temp) | float - hysteresis | float }}
    for:
      minutes: !input debounce_minutes

variables:
  # Only what the outer gate below needs. Everything the TTS/push actions
  # need is declared *inside* each of them (see comment further down) so
  # that each one is self-sufficient when run individually.
  window_sensors: !input window_sensors

condition: []

action:
  - if:
      - condition: or
        conditions:
          # Automatic morning run: only within the configured time window
          # and only while at least one window is (still) open.
          - condition: and
            conditions:
              - condition: template
                value_template: "{{ trigger is defined and trigger.id == 'close' }}"
              - condition: time
                after: !input morning_start
                before: !input morning_end
              - condition: template
                value_template: >
                  {{ window_sensors | count == 0
                     or window_sensors | select('is_state', 'on') | list | count > 0 }}
          # Automatic evening run: only within the configured time window,
          # only while it's actually warm enough inside, and only while at
          # least one window is (still) closed.
          - condition: and
            conditions:
              - condition: template
                value_template: "{{ trigger is defined and trigger.id == 'open' }}"
              - condition: time
                after: !input evening_start
                before: !input evening_end
              - condition: numeric_state
                entity_id: !input indoor_temp
                above: !input min_indoor_open
              - condition: template
                value_template: >
                  {{ window_sensors | count == 0
                     or window_sensors | select('is_state', 'off') | list | count > 0 }}
          # Manual test run (e.g. via the editor's per-action "Run" button):
          # no real close/open trigger, so skip all the gating above.
          - condition: template
            value_template: "{{ trigger is not defined or trigger.id not in ['close', 'open'] }}"
    then:
      # Each of the two actions below declares its own `variables:` instead
      # of relying on the top-level block above. Home Assistant's
      # per-action "Run" test (editor -> action -> Run) does not carry over
      # variables from outside the action being run, only from within it -
      # so anything needed here must be self-contained or the test (and,
      # it turns out, nothing at all) gets sent. See:
      # https://www.home-assistant.io/docs/automation/troubleshooting/
      - alias: Send TTS announcement
        sequence:
          - variables:
              message_close: !input message_close
              message_open: !input message_open
              test_message: !input test_message
              tts_engine: !input tts_engine
              tts_media_players: !input tts_media_players
              # `trigger` is only defined for a real close/open run. A
              # manual per-action test run has no trigger context, so it
              # falls back to test_message.
              message: >
                {% if trigger is defined and trigger.id == 'close' %}
                  {{ message_close }}
                {% elif trigger is defined and trigger.id == 'open' %}
                  {{ message_open }}
                {% else %}
                  {{ test_message }}
                {% endif %}
          - if:
              - condition: template
                value_template: "{{ tts_engine != '' and tts_media_players | count > 0 }}"
            then:
              - action: tts.speak
                target:
                  entity_id: !input tts_engine
                data:
                  media_player_entity_id: !input tts_media_players
                  message: "{{ message }}"

      - alias: Send push notification
        sequence:
          - variables:
              message_close: !input message_close
              message_open: !input message_open
              test_message: !input test_message
              notify_targets_input: !input notify_targets
              message: >
                {% if trigger is defined and trigger.id == 'close' %}
                  {{ message_close }}
                {% elif trigger is defined and trigger.id == 'open' %}
                  {{ message_open }}
                {% else %}
                  {{ test_message }}
                {% endif %}
              # Notify targets are picked directly (no guessing a service
              # name, no relying on a person's device_trackers to find the
              # right device). For a real automatic run, a target is only
              # sent to if its device has a device_tracker that reports
              # "home" - no tracker found, or not home, means it's skipped.
              # A manual test run (no trigger context) always sends to
              # every configured target regardless of presence.
              notify_targets: >
                {% if trigger is defined and trigger.id in ['close', 'open'] %}
                  {% set ns = namespace(targets=[]) %}
                  {% for nt in notify_targets_input %}
                    {% set trk = namespace(home=false) %}
                    {% set did = device_id(nt) %}
                    {% if did %}
                      {% for e in device_entities(did) %}
                        {% if e.startswith('device_tracker.') and is_state(e, 'home') %}
                          {% set trk.home = true %}
                        {% endif %}
                      {% endfor %}
                    {% endif %}
                    {% if trk.home %}
                      {% set ns.targets = ns.targets + [nt] %}
                    {% endif %}
                  {% endfor %}
                  {{ ns.targets }}
                {% else %}
                  {{ notify_targets_input }}
                {% endif %}
          - repeat:
              for_each: "{{ notify_targets }}"
              sequence:
                - action: notify.send_message
                  target:
                    entity_id: "{{ repeat.item }}"
                  data:
                    title: !input notify_title
                    message: "{{ message }}"
